name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y cmake g++ graphviz
    - name: Build
      run: mkdir build && cd build && cmake .. && make
    - name: Run Tests
      run: ./tests/run_tests.sh
